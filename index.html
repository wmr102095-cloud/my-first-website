<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현재 날씨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3a5f, #2d6a9f); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { text-align: center; padding: 2.5rem 2rem; max-width: 400px; width: 90%; background: rgba(255,255,255,0.12); backdrop-filter: blur(12px); border-radius: 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3); color: #fff; }
    .icon { font-size: 5rem; margin-bottom: 0.5rem; }
    .city { font-size: 1.2rem; color: #cce4ff; margin-bottom: 0.3rem; }
    .temp { font-size: 4rem; font-weight: 700; margin: 0.3rem 0; }
    .desc { font-size: 1.1rem; color: #b8d9ff; margin-bottom: 1.5rem; }
    .info { display: flex; justify-content: center; gap: 2rem; background: rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; }
    .info div { font-size: 0.9rem; color: #cce4ff; }
    .info span { display: block; font-size: 1.2rem; font-weight: 600; color: #fff; }
    .footer { margin-top: 1.5rem; font-size: 0.75rem; color: #7fb3d3; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⛅</div>
    <div class="city">📍 서울, 대한민국</div>
    <div class="temp">23°C</div>
    <div class="desc">부분적으로 흐림</div>
    <div class="info">
      <div><span>62%</span>습도</div>
      <div><span>12 km/h</span>바람</div>
      <div><span>1013 hPa</span>기압</div>
    </div>
    <div class="footer">마지막 업데이트: 2026-06-04 · GitHub Pages</div>
  </div>
</body>
</html>
