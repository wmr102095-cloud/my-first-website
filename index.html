<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { text-align: center; padding: 3rem 2rem; max-width: 520px; width: 90%; background: #1e293b; border-radius: 1.5rem; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .avatar { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; line-height: 1.7; margin-bottom: 1.5rem; font-size: 1rem; }
    .badge { display: inline-block; background: #334155; color: #7dd3fc; padding: 0.3rem 0.9rem; border-radius: 999px; font-size: 0.85rem; margin: 0.25rem; }
    .footer { margin-top: 2rem; font-size: 0.8rem; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요!</h1>
    <p>저는 웹 개발을 배우고 있는 개발자입니다.<br>이 페이지는 나의 첫 번째 GitHub Pages 배포입니다.</p>
    <div>
      <span class="badge">HTML</span>
      <span class="badge">CSS</span>
      <span class="badge">GitHub Pages</span>
    </div>
    <div class="footer">🚀 Deployed with GitHub Actions</div>
  </div>
</body>
</html>
