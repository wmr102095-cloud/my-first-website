name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            lecture1/game_community/package-lock.json
            lecture1/mini_sns/package-lock.json

      # ── game_community 빌드 ──────────────────────────────
      - name: Install game_community
        working-directory: lecture1/game_community
        run: npm ci

      - name: Build game_community
        working-directory: lecture1/game_community
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ── mini_sns 빌드 ────────────────────────────────────
      - name: Install mini_sns
        working-directory: lecture1/mini_sns
        run: npm ci

      - name: Build mini_sns
        working-directory: lecture1/mini_sns
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ── 산출물 합치기 ─────────────────────────────────────
      # game_community → root, mini_sns → /mini_sns/ 하위
      - name: Combine build outputs
        run: |
          mkdir -p combined_dist
          cp -r lecture1/game_community/dist/. combined_dist/
          mkdir -p combined_dist/mini_sns
          cp -r lecture1/mini_sns/dist/. combined_dist/mini_sns/

      # ── GitHub Pages 배포 ─────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined_dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
