<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTT Contents - 스트리밍 콘텐츠</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">OTT<span>Contents</span></a>
    <div class="header-actions">
      <a href="register.html" class="btn btn-primary">+ 콘텐츠 등록</a>
    </div>
  </header>

  <main class="main">
    <div class="hero">
      <h1>지금 뜨는 <span>스트리밍</span> 콘텐츠</h1>
      <p>영화, 드라마, 애니메이션까지 — 당신이 찾는 모든 콘텐츠</p>
    </div>

    <!-- 인기 드라마 원형 캐러셀 -->
    <div class="drama-section">
      <div class="section-title">지금 인기 드라마</div>
      <div class="drama-carousel-3d-wrap">
        <div class="drama-scene" id="drama-scene">
          <!-- JS로 생성 -->
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-row">
        <span class="filter-label">유형</span>
        <button class="filter-btn active" data-type="전체">전체</button>
        <button class="filter-btn" data-type="영화">영화</button>
        <button class="filter-btn" data-type="드라마">드라마</button>
        <button class="filter-btn" data-type="애니메이션">애니메이션</button>
        <button class="filter-btn" data-type="다큐멘터리">다큐멘터리</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">장르</span>
        <button class="filter-btn active" data-genre="전체">전체</button>
        <button class="filter-btn" data-genre="액션">액션</button>
        <button class="filter-btn" data-genre="스릴러">스릴러</button>
        <button class="filter-btn" data-genre="로맨스">로맨스</button>
        <button class="filter-btn" data-genre="드라마">드라마</button>
        <button class="filter-btn" data-genre="코미디">코미디</button>
        <button class="filter-btn" data-genre="SF">SF</button>
        <button class="filter-btn" data-genre="애니메이션">애니메이션</button>
      </div>
    </div>

    <div class="section-title">
      콘텐츠 목록 <span class="count-badge" id="count-badge"></span>
    </div>

    <div class="content-grid" id="content-grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>콘텐츠 불러오는 중...</p>
      </div>
    </div>
  </main>

  <!-- 드라마 상세 팝업 -->
  <div id="drama-popup-overlay" class="drama-popup-overlay">
    <div class="drama-popup-modal" role="dialog" aria-modal="true">
      <button class="popup-close-btn" id="popup-close-btn" aria-label="닫기">✕</button>

      <!-- 상단 1/3 : 포스터 -->
      <div class="popup-poster-wrap">
        <img id="popup-poster-img" src="" alt="" class="popup-poster-img">
        <div id="popup-poster-fb" class="popup-poster-fallback"></div>
        <div class="popup-poster-gradient"></div>
        <span id="popup-rank-badge" class="popup-rank-badge"></span>
      </div>

      <!-- 하단 2/3 : 정보 -->
      <div class="popup-body">
        <div class="popup-tags">
          <span id="popup-type"   class="popup-tag-type"></span>
          <span id="popup-genre"  class="popup-tag-genre"></span>
          <span id="popup-year"   class="popup-tag-year"></span>
          <span id="popup-rating" class="popup-tag-rating"></span>
        </div>
        <h2 id="popup-title" class="popup-title"></h2>

        <div class="popup-section">
          <span class="popup-label">줄거리</span>
          <p id="popup-desc" class="popup-desc"></p>
        </div>
        <div class="popup-section">
          <span class="popup-label">감독</span>
          <p id="popup-director" class="popup-value"></p>
        </div>
        <div class="popup-section">
          <span class="popup-label">출연배우</span>
          <p id="popup-cast" class="popup-value"></p>
        </div>

        <a id="popup-watch-btn" class="popup-watch-btn" href="#" target="_blank" rel="noopener">
          ▶ 시청하기
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/list.js"></script>
</body>
</html>
