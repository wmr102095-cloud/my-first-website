<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTT Contents - 스트리밍 콘텐츠</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">OTT<span>Contents</span></a>
    <div class="header-actions">
      <a href="register.html" class="btn btn-primary">+ 콘텐츠 등록</a>
    </div>
  </header>

  <main class="main">
    <div class="hero">
      <h1>지금 뜨는 <span>스트리밍</span> 콘텐츠</h1>
      <p>영화, 드라마, 애니메이션까지 — 당신이 찾는 모든 콘텐츠</p>
    </div>

    <!-- 인기 드라마 원형 캐러셀 -->
    <div class="drama-section">
      <div class="section-title">지금 인기 드라마</div>
      <div class="drama-carousel-wrap">
        <div class="drama-track" id="drama-track">
          <div class="drama-track-inner" id="drama-track-inner">
            <!-- JS로 생성 -->
          </div>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="filter-row">
        <span class="filter-label">유형</span>
        <button class="filter-btn active" data-type="전체">전체</button>
        <button class="filter-btn" data-type="영화">영화</button>
        <button class="filter-btn" data-type="드라마">드라마</button>
        <button class="filter-btn" data-type="애니메이션">애니메이션</button>
        <button class="filter-btn" data-type="다큐멘터리">다큐멘터리</button>
      </div>
      <div class="filter-row">
        <span class="filter-label">장르</span>
        <button class="filter-btn active" data-genre="전체">전체</button>
        <button class="filter-btn" data-genre="액션">액션</button>
        <button class="filter-btn" data-genre="스릴러">스릴러</button>
        <button class="filter-btn" data-genre="로맨스">로맨스</button>
        <button class="filter-btn" data-genre="드라마">드라마</button>
        <button class="filter-btn" data-genre="코미디">코미디</button>
        <button class="filter-btn" data-genre="SF">SF</button>
        <button class="filter-btn" data-genre="애니메이션">애니메이션</button>
      </div>
    </div>

    <div class="section-title">
      콘텐츠 목록 <span class="count-badge" id="count-badge"></span>
    </div>

    <div class="content-grid" id="content-grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>콘텐츠 불러오는 중...</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/list.js"></script>
</body>
</html>
