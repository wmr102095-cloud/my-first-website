<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTT Contents - 스트리밍 콘텐츠</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/splash.js" defer></script>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">
      <img src="assets/logo.png" alt="BOOM!" class="logo-img">
      <span class="logo-text">BOOM<em>!</em></span>
    </a>
    <nav class="header-nav">
      <a href="#" class="nav-link active" data-filter="전체">홈</a>
      <a href="#" class="nav-link" data-filter="영화">영화</a>
      <a href="#" class="nav-link" data-filter="드라마">드라마</a>
      <a href="#" class="nav-link" data-filter="애니메이션">애니메이션</a>
      <a href="#" class="nav-link" data-filter="찜">나의 찜</a>
    </nav>
    <div class="header-actions" id="header-actions">
      <button id="search-btn" class="search-icon-btn" aria-label="검색" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <a href="auth.html" class="btn btn-ghost">로그인</a>
      <a href="auth.html" class="btn btn-primary">회원가입</a>
    </div>
  </header>

  <!-- 검색 오버레이 -->
  <div id="search-overlay" class="search-overlay">
    <div class="search-bar-wrap">
      <svg class="search-bar-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" class="search-input" type="text" placeholder="작품명, 장르, 감독으로 검색..." autocomplete="off">
      <button id="search-close-btn" class="search-close-btn" type="button">✕</button>
    </div>
    <div id="search-results" class="search-results">
      <p class="search-hint">검색어를 입력하세요</p>
    </div>
  </div>

  <main class="main">
    <div class="hero">
      <canvas id="hero-canvas"></canvas>
      <div class="hero-shockwaves">
        <div class="sw-ring r1"></div>
        <div class="sw-ring r2"></div>
        <div class="sw-ring r3"></div>
      </div>
      <div class="hero-inner">
        <span class="boom-text">BOOM<em class="boom-bang">!</em></span>
        <p class="boom-tagline">터지는 콘텐츠</p>
      </div>
    </div>

    <!-- 드라마 그룹 -->
    <div id="group-drama" class="category-group">
      <div class="drama-section">
        <div class="section-title"><span>지금 TOP10 드라마</span></div>
        <div class="drama-carousel-3d-wrap">
          <div class="drama-scene" id="scene-drama"></div>
        </div>
      </div>
      <div class="drama-section" id="rec-drama" style="display:none">
        <div class="section-title"><span>이런 드라마는 어떠세요?</span></div>
        <div class="row-wrap" id="row-drama"></div>
      </div>
    </div>

    <!-- 영화 그룹 -->
    <div id="group-movie" class="category-group">
      <div class="drama-section">
        <div class="section-title"><span>지금 TOP10 영화</span></div>
        <div class="drama-carousel-3d-wrap">
          <div class="drama-scene" id="scene-movie"></div>
        </div>
      </div>
      <div class="drama-section" id="rec-movie" style="display:none">
        <div class="section-title"><span>이런 영화는 어떠세요?</span></div>
        <div class="row-wrap" id="row-movie"></div>
      </div>
    </div>

    <!-- 애니메이션 그룹 -->
    <div id="group-anime" class="category-group">
      <div class="drama-section">
        <div class="section-title"><span>지금 TOP10 애니메이션</span></div>
        <div class="drama-carousel-3d-wrap">
          <div class="drama-scene" id="scene-anime"></div>
        </div>
      </div>
      <div class="drama-section" id="rec-anime" style="display:none">
        <div class="section-title"><span>이런 애니는 어떠세요?</span></div>
        <div class="row-wrap" id="row-anime"></div>
      </div>
    </div>
  </main>

  <!-- 드라마 상세 팝업 -->
  <div id="drama-popup-overlay" class="drama-popup-overlay">
    <div class="drama-popup-modal" role="dialog" aria-modal="true">
      <button class="popup-close-btn" id="popup-close-btn" aria-label="닫기">✕</button>

      <!-- 상단 1/3 : 포스터 -->
      <div class="popup-poster-wrap">
        <img id="popup-poster-img" src="" alt="" class="popup-poster-img">
        <div id="popup-poster-fb" class="popup-poster-fallback"></div>
        <div class="popup-poster-gradient"></div>
        <span id="popup-rank-badge" class="popup-rank-badge"></span>
      </div>

      <!-- 하단 2/3 : 정보 -->
      <div class="popup-body">
        <div class="popup-tags">
          <span id="popup-type"   class="popup-tag-type"></span>
          <span id="popup-genre"  class="popup-tag-genre"></span>
          <span id="popup-year"   class="popup-tag-year"></span>
          <span id="popup-rating" class="popup-tag-rating"></span>
        </div>
        <h2 id="popup-title" class="popup-title"></h2>

        <div class="popup-section">
          <span class="popup-label">줄거리</span>
          <p id="popup-desc" class="popup-desc"></p>
        </div>
        <div class="popup-section">
          <span class="popup-label">감독</span>
          <p id="popup-director" class="popup-value"></p>
        </div>
        <div class="popup-section">
          <span class="popup-label">출연배우</span>
          <p id="popup-cast" class="popup-value"></p>
        </div>

        <div class="popup-action-row">
          <a id="popup-watch-btn" class="popup-watch-btn" href="#">
            ▶ 재생
          </a>
          <button id="popup-wish-btn" class="popup-wish-btn" type="button">♡ 찜하기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/list.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/hero.js"></script>
</body>
</html>
