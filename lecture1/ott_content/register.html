<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘텐츠 등록 - OTT Contents</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">OTT<span>Contents</span></a>
  </header>

  <div class="form-container">
    <div class="form-header">
      <a href="index.html" class="btn btn-ghost">← 목록으로</a>
      <h1>콘텐츠 등록</h1>
    </div>

    <form class="form-card" id="register-form">
      <div class="form-group">
        <label>제목 <span class="required">*</span></label>
        <input type="text" id="title" placeholder="콘텐츠 제목을 입력하세요" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>콘텐츠 유형 <span class="required">*</span></label>
          <select id="content_type" required>
            <option value="영화">영화</option>
            <option value="드라마">드라마</option>
            <option value="애니메이션">애니메이션</option>
            <option value="다큐멘터리">다큐멘터리</option>
          </select>
        </div>
        <div class="form-group">
          <label>장르 <span class="required">*</span></label>
          <select id="genre" required>
            <option value="액션">액션</option>
            <option value="스릴러">스릴러</option>
            <option value="로맨스">로맨스</option>
            <option value="드라마">드라마</option>
            <option value="코미디">코미디</option>
            <option value="SF">SF</option>
            <option value="애니메이션">애니메이션</option>
            <option value="다큐멘터리">다큐멘터리</option>
            <option value="공포">공포</option>
            <option value="판타지">판타지</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>썸네일 이미지 URL</label>
        <input type="url" id="thumbnail_url" placeholder="https://example.com/poster.jpg">
        <div class="thumb-preview" id="thumb-preview">
          <img id="thumb-img" src="" alt="썸네일 미리보기">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>감독</label>
          <input type="text" id="director" placeholder="감독 이름">
        </div>
        <div class="form-group">
          <label>개봉연도</label>
          <input type="number" id="release_year" placeholder="2024" min="1900" max="2030">
        </div>
      </div>

      <div class="form-group">
        <label>출연진</label>
        <input type="text" id="actors" placeholder="배우 이름을 쉼표로 구분해서 입력 (예: 홍길동, 김철수)">
      </div>

      <div class="form-group">
        <label>평점</label>
        <input type="number" id="rating" placeholder="0.0 ~ 10.0" min="0" max="10" step="0.1">
      </div>

      <div class="form-group">
        <label>줄거리</label>
        <textarea id="description" placeholder="콘텐츠 줄거리나 설명을 입력하세요..."></textarea>
      </div>

      <div class="form-footer">
        <a href="index.html" class="btn btn-secondary">취소</a>
        <button type="submit" class="btn btn-primary" id="submit-btn">등록하기</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
